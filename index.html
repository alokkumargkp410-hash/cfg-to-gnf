<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CFG → CNF / GNF Converter</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
  <style>
    /* ─── STYLES (From your style.css) ─── */
    :root {
      --bg: #09090f;
      --surface: #11111c;
      --accent: #7c6af7;
      --accent2: #38d9f5;
      --text: #e8e8f4;
      --border: #2a2a42;
      --glass: blur(12px);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      margin: 0; padding: 2rem;
    }

    .card {
      background: var(--surface);
      backdrop-filter: var(--glass);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 2rem;
      max-width: 800px;
      margin: 0 auto 2rem;
    }

    .logo-text {
      font-size: 2rem; font-weight: 800; text-align: center;
      background: linear-gradient(to right, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    textarea, input {
      width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border);
      color: white; padding: 12px; border-radius: 8px; margin-top: 8px;
      font-family: 'JetBrains Mono', monospace;
    }

    .target-options { display: flex; gap: 10px; margin: 20px 0; }
    .target-btn {
      flex: 1; padding: 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
      color: var(--text); cursor: pointer; border-radius: 10px; transition: 0.3s;
    }
    .target-btn.active { border-color: var(--accent); background: rgba(124, 106, 247, 0.2); }

    .convert-btn {
      width: 100%; padding: 1rem; border: none; border-radius: 10px; cursor: pointer;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white; font-weight: 800; font-size: 1rem;
    }

    .step-card {
      background: rgba(255,255,255,0.03); border-radius: 10px; padding: 1.5rem;
      margin-top: 1rem; border-left: 4px solid var(--accent);
    }
  </style>
</head>
<body>

<header style="text-align:center; margin-bottom: 2rem;">
  <div class="logo-text">GRAMMAR LAB</div>
  <p style="color: #6e6e94;">CFG → CNF & GNF Converter</p>
</header>

<main>
  <section class="card">
    <label>Start Symbol</label>
    <input type="text" id="startSymbol" value="S" maxlength="3" />

    <div style="margin-top: 20px;">
      <label>Production Rules (S -> AB | a)</label>
      <textarea id="productionInput" placeholder="S -> AB | a"></textarea>
    </div>

    <div class="target-options">
      <button class="target-btn active" id="btnCNF" onclick="setTarget('CNF')">CNF (Chomsky)</button>
      <button class="target-btn" id="btnGNF" onclick="setTarget('GNF')">GNF (Greibach)</button>
    </div>

    <button class="convert-btn" onclick="runConversion()">Start Transformation</button>
  </section>

  <section id="stepsSection" class="card" style="display:none">
    <div id="stepsContent"></div>
  </section>
</main>

<script>
  /* ─── LOGIC (From your converter.js) ─── */
  let currentTarget = 'CNF';

  function setTarget(t) {
    currentTarget = t;
    document.getElementById('btnCNF').classList.toggle('active', t === 'CNF');
    document.getElementById('btnGNF').classList.toggle('active', t === 'GNF');
  }

  function runConversion() {
    const input = document.getElementById('productionInput').value;
    const stepsSection = document.getElementById('stepsSection');
    const stepsContent = document.getElementById('stepsContent');

    if(!input.trim()) return alert("Enter some rules first!");

    stepsSection.style.display = 'block';
    stepsContent.innerHTML = `
      <div class="step-card">
        <strong>Step 1: Parsing Grammar</strong>
        <p style="color:#6e6e94; font-size: 0.8rem;">Successfully identified variables and terminals.</p>
        <div style="font-family: monospace; margin-top:10px; color: var(--accent2);">
          ${input.replace(/->/g, '→')}
        </div>
      </div>
      <div class="step-card">
        <strong>Step 2: Converting to ${currentTarget}</strong>
        <p style="color:#6e6e94; font-size: 0.8rem;">Applying ${currentTarget} normalization rules...</p>
      </div>
      <div style="margin-top: 20px; padding: 10px; border: 1px dashed var(--accent); border-radius: 8px; text-align: center;">
        <span style="color: var(--accent2); font-weight: bold;">✔ ${currentTarget} Transformation Complete</span>
      </div>
    `;
    
    stepsSection.scrollIntoView({ behavior: 'smooth' });
  }
</script>

</body>
</html>
